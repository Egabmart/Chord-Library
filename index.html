<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --white-key-w: 34px;
            --black-key-w: 21px;
        }

        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .piano-keyboard, .fretboard {
            scrollbar-width: thin;
            scrollbar-color: #64748b #f1f5f9;
            touch-action: pan-x;
            overflow-x: auto;
            overflow-y: hidden;
        }
        
        .white-key {
            width: var(--white-key-w);
            height: 168px;
            background: white;
            border: 2px solid #e2e8f0;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }
        
        .white-key:hover {
            background: #f8fafc;
        }
        
        .white-key.selected {
            background: #3b82f6 !important;
            border-color: #2563eb;
            color: white;
        }
        
        .black-key {
            position: relative;
            width: var(--black-key-w);
            height: 108px;
            background: #1e2937;
            border: 2px solid #334155;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
            margin-left: -10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .black-key:hover {
            background: #334155;
        }
        
        .black-key.selected {
            background: #1e40af !important;
            border-color: #1e3a8a;
            color: white;
        }
        
        .key-label {
            font-size: 10px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
            letter-spacing: -.02em;
        }
        
        .chord-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .chord-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .fret-slot {
            transition: background 0.2s;
        }

        .fret-slot:hover {
            background: #f8fafc;
        }

        .note-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 10px;
            font-weight: bold;
            z-index: 20;
        }

        .selected::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #3b82f6;
            border-radius: 9999px;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.1);
            z-index: 10;
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200 min-h-screen flex items-center justify-center">
    <div id="app" 
         class="w-full max-w-[420px] mx-auto bg-white min-h-screen shadow-2xl overflow-hidden flex flex-col">
        
        <!-- MAIN VIEW -->
        <div id="main-view" class="flex-1 flex flex-col">
            <!-- Header -->
            <div class="px-6 pt-8 pb-4 bg-white border-b border-zinc-100 flex items-center justify-between">
                <div>
                    <h1 class="title-font text-3xl font-semibold tracking-tighter text-zinc-900">Chord Library</h1>
                    <p class="text-zinc-400 text-sm mt-0.5">Your saved chords</p>
                </div>
                <button onclick="showNewChordForm()" 
                        class="w-12 h-12 bg-blue-500 hover:bg-blue-600 transition-colors text-white rounded-3xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                </button>
            </div>

            <!-- Chord List -->
            <div id="chord-list" class="flex-1 overflow-y-auto px-4 py-6 space-y-3 bg-zinc-50">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- CHORD INFO VIEW -->
        <div id="chord-info-view" class="hidden flex-1 flex flex-col">
            <!-- Header -->
            <div class="px-5 pt-6 pb-3 bg-white border-b border-zinc-100 flex items-center">
                <button onclick="backToMain()" 
                        class="flex items-center text-blue-500 font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                    </svg>
                    Back
                </button>
                <div class="flex-1 text-center">
                    <div id="info-chord-name" 
                         class="title-font text-2xl font-semibold tracking-tighter text-zinc-900"></div>
                </div>
                <div class="flex gap-3">
                    <button id="edit-btn" onclick="editCurrentChord()" 
                            class="px-5 py-2 text-sm font-semibold bg-white border border-zinc-200 hover:border-zinc-300 rounded-2xl text-blue-500">
                        Edit
                    </button>
                    <button onclick="deleteCurrentChord()" 
                            class="px-5 py-2 text-sm font-semibold bg-red-50 text-red-500 hover:bg-red-100 rounded-2xl">
                        Delete
                    </button>
                </div>
            </div>

            <!-- Transpose -->
            <div class="px-6 pt-6 pb-2 bg-white">
                <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3 px-1">TRANSPOSE</div>
                <div id="transpose-picker"></div>
            </div>

            <!-- Inversion -->
            <div id="inversion-section" class="px-6 pt-4 pb-4 bg-white border-t border-zinc-100">
                <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3 px-1">INVERSION</div>
                <div id="inversion-picker" class="flex gap-2 overflow-x-auto pb-2 snap-x"></div>
            </div>

            <!-- Instrument -->
            <div class="px-6 pt-4 pb-4 bg-white border-t border-zinc-100">
                <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3 px-1">INSTRUMENT</div>
                <div id="info-instrument-picker" class="flex gap-2 overflow-x-auto pb-2 snap-x"></div>
            </div>

            <!-- Instrument Container -->
            <div class="flex-1 bg-zinc-50 px-4 pt-6 pb-6">
                <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3 px-1">CHORD MAKER</div>
                <div id="info-instrument-container" class="piano-keyboard"></div>
            </div>
        </div>

        <!-- NEW CHORD VIEW -->
        <div id="new-chord-view" class="hidden flex-1 flex flex-col">
            <!-- Header -->
            <div class="px-5 pt-6 pb-3 bg-white border-b border-zinc-100 flex items-center">
                <button onclick="backToMain()" 
                        class="flex items-center text-blue-500 font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                    </svg>
                    Back
                </button>
                <div class="flex-1 text-center title-font text-2xl font-semibold tracking-tighter text-zinc-900">New Chord</div>
                <div class="w-9"></div>
            </div>

            <div class="flex-1 overflow-y-auto bg-zinc-50">
                <!-- Root Picker -->
                <div class="px-6 pt-6">
                    <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3">ROOT NOTE</div>
                    <div id="root-picker"></div>
                </div>

                <!-- Chord Name -->
                <div class="px-6 mt-8">
                    <div class="text-xs font-medium tracking-widest text-zinc-400 mb-2">CHORD NAME (suffix)</div>
                    <input id="chord-suffix-input" 
                           type="text" 
                           placeholder="maj7"
                           class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:ring-0 rounded-3xl px-5 py-4 text-xl font-medium text-zinc-900 placeholder-zinc-300">
                    <div class="text-[10px] text-zinc-400 mt-2 px-1">Example: maj7, m7, dim, 7, sus4...</div>
                </div>

                <!-- Instrument Picker -->
                <div class="px-6 mt-6">
                    <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3">INSTRUMENT</div>
                    <div id="new-instrument-picker" class="flex gap-2 overflow-x-auto pb-2 snap-x"></div>
                </div>

                <!-- Keyboard/Fretboard section -->
                <div class="px-6 mt-9 pb-8">
                    <div class="flex items-baseline justify-between mb-3 px-1">
                        <div class="text-xs font-medium tracking-widest text-zinc-400">CHORD MAKER</div>
                        <div id="selected-count" 
                             class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-3xl font-mono">0 notes</div>
                    </div>
                    <div id="new-instrument-container" class="piano-keyboard"></div>
                </div>
            </div>

            <!-- Save Button -->
            <div class="p-6 bg-white border-t border-zinc-100">
                <button onclick="saveChord(false)"
                        id="save-btn"
                        class="w-full bg-blue-500 hover:bg-blue-600 transition-all disabled:bg-zinc-200 disabled:text-zinc-400 text-white font-semibold text-lg py-5 rounded-3xl shadow-xl shadow-blue-500/40">
                    SAVE CHORD
                </button>

                <button id="save-folder-btn"
                        onclick="handleSaveFolderClick()"
                        class="w-full mt-3 bg-white border border-zinc-200 hover:border-zinc-300 text-zinc-700 font-semibold text-lg py-4 rounded-3xl">
                    SAVE IN FOLDER
                </button>

                <div id="folder-controls" class="mt-4 hidden">
                    <label class="text-xs font-medium tracking-widest text-zinc-400 mb-2 block">Folder</label>
                    <div class="flex gap-2">
                        <select id="folder-select" class="flex-1 bg-white border border-zinc-200 rounded-3xl px-4 py-3 text-sm text-zinc-700">
                            <!-- populated by JS -->
                        </select>
                        <button id="create-folder-btn" onclick="handleCreateFolder()" 
                                class="px-4 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-3xl text-sm font-semibold">
                            +
                        </button>
                    </div>
                    <p class="text-xs text-zinc-400 mt-2">Select a folder to save in, or create a new one.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Note names
        const noteNamesAll = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        // Instrument data
        const instrumentList = ["Piano", "Guitar", "Ukulele", "Charango"];
        const instrumentData = {
            Piano: {
                type: "keyboard"
            },
            Guitar: {
                type: "fretboard",
                openMidis: [40, 45, 50, 55, 59, 64], // E2 A2 D3 G3 B3 E4
                stringLabels: ["E", "A", "D", "G", "B", "E"],
                maxFrets: 24,
                fretMarkers: [3, 5, 7, 9, 12, 15, 17]
            },
            Ukulele: {
                type: "fretboard",
                openMidis: [67, 60, 64, 69], // G4 C4 E4 A4
                stringLabels: ["G", "C", "E", "A"],
                maxFrets: 20,
                fretMarkers: [3, 5, 7, 9, 12, 15, 17]
            },
            Charango: {
                type: "fretboard",
                openMidis: [67, 72, 76, 69, 76], // G4 C5 E5 A4 E5
                stringLabels: ["G", "C", "E", "A", "E"],
                maxFrets: 18,
                fretMarkers: [3, 5, 7, 9, 12, 15, 17]
            }
        };

        // Data
        let chords = [];
        let folders = [];
        let folderExpandedStates = {};
        let currentChordId = null;
        let editingChordId = null;
        let infoCurrentInversion = 0;
        let infoCurrentInstrument = "Piano";
        let currentRoot = "C";
        let currentSuffix = "";
        let selectedMidis = new Set();
        let selectedFrets = [];
        let currentInstrument = "Piano";

        // Folder mode (new/edit chord)
        let saveInFolderMode = false;
        let selectedFolderId = null;

        // Helpers
        function midiToNoteName(midi, withOctave = false) {
            const octave = Math.floor(midi / 12) - 1;
            const noteIndex = midi % 12;
            return noteNamesAll[noteIndex] + (withOctave ? octave : '');
        }

        function noteNameToMidi(noteName) {
            const octave = parseInt(noteName.slice(-1));
            let notePart = noteName.slice(0, -1);
            const index = noteNamesAll.indexOf(notePart);
            if (index === -1) return 60;
            return 12 * (octave + 1) + index;
        }

        function getRootMidi(root) {
            return noteNameToMidi(root + "4");
        }

        function generateAllKeys() {
            const keys = [];
            let midi = 21;
            while (midi <= 108) {
                const noteIndex = midi % 12;
                const noteName = noteNamesAll[noteIndex];
                const octave = Math.floor(midi / 12) - 1;
                const isBlack = noteName.includes("#");
                keys.push({
                    midi: midi,
                    noteName: noteName,
                    octave: octave,
                    isBlack: isBlack
                });
                midi++;
            }
            return keys;
        }

        // Render keyboard
        function renderKeyboard(containerId, selectedSet, interactive = false, toggleCallback = null) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'piano-keyboard flex bg-white border border-zinc-200 rounded-3xl p-4 shadow-inner min-w-max snap-x';
            
            const allKeys = generateAllKeys();
            
            allKeys.forEach(key => {
                const keyEl = document.createElement('div');
                
                if (key.isBlack) {
                    keyEl.className = `black-key`;
                } else {
                    keyEl.className = `white-key`;
                }
                
                keyEl.dataset.midi = key.midi;
                
                if (selectedSet.has(key.midi)) {
                    keyEl.classList.add('selected');
                    const label = document.createElement('div');
                    label.className = 'note-label';
                    label.textContent = noteNamesAll[key.midi % 12];
                    keyEl.appendChild(label);
                }
                
                if (!key.isBlack && key.noteName === "C") {
                    const label = document.createElement('div');
                    label.className = 'key-label';
                    label.textContent = `C${key.octave}`;
                    keyEl.appendChild(label);
                }
                
                if (interactive) {
                    keyEl.style.cursor = 'pointer';
                    keyEl.addEventListener('click', () => toggleCallback(key.midi));
                }
                
                wrapper.appendChild(keyEl);
            });
            
            container.appendChild(wrapper);
            return wrapper;
        }

        // Render fretboard
        function renderFretboard(containerId, selectedFrets, interactive = false, toggleCallback = null, instData) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'fretboard flex bg-white border border-zinc-200 rounded-3xl p-4 shadow-inner min-w-max snap-x';
            
            // Tuning column
            const tuningCol = document.createElement('div');
            tuningCol.className = 'flex flex-col h-[168px] pr-4 justify-between';
            instData.stringLabels.forEach(label => {
                const labelEl = document.createElement('div');
                labelEl.className = 'flex-1 flex items-center justify-end text-xs font-medium text-zinc-500';
                labelEl.textContent = label;
                tuningCol.appendChild(labelEl);
            });
            wrapper.appendChild(tuningCol);
            
            // Fret positions (1 to maxFrets)
            for (let fret = 1; fret <= instData.maxFrets; fret++) {
                const fretCol = document.createElement('div');
                fretCol.className = `flex flex-col h-[168px] min-w-[var(--white-key-w)] relative border-l ${fret === 1 ? 'border-l-2 border-zinc-400' : 'border-zinc-200'}`;
                
                // String slots
                instData.openMidis.forEach((openMidi, s) => {
                    const slot = document.createElement('div');
                    slot.className = 'fret-slot flex-1 relative flex items-center justify-center border-b border-zinc-200 last:border-b-0';
                    const midi = openMidi + fret;
                    slot.dataset.midi = midi;
                    slot.dataset.string = s;
                    slot.dataset.fret = fret;
                    
                    if (selectedFrets[s] === fret) {
                        slot.classList.add('selected');
                        const label = document.createElement('div');
                        label.className = 'note-label';
                        label.textContent = noteNamesAll[midi % 12];
                        slot.appendChild(label);
                    }
                    
                    if (interactive) {
                        slot.style.cursor = 'pointer';
                        slot.addEventListener('click', () => toggleCallback(s, fret));
                    }
                    
                    fretCol.appendChild(slot);
                });
                
                // Fret marker
                if (instData.fretMarkers.includes(fret)) {
                    const marker = document.createElement('div');
                    marker.className = 'absolute bottom-[-20px] left-0 right-0 text-center text-xs text-zinc-400';
                    marker.textContent = fret;
                    fretCol.appendChild(marker);
                }
                
                wrapper.appendChild(fretCol);
            }
            
            container.appendChild(wrapper);
            return wrapper;
        }

        // Auto-scroll
        function autoScrollInstrument(containerId, midiArray) {
            const container = document.getElementById(containerId);
            const wrapper = container.firstChild;
            if (!wrapper || midiArray.length === 0) return;

            let minX = Infinity;
            let maxX = -Infinity;
            midiArray.forEach(midi => {
                const el = wrapper.querySelector(`[data-midi="${midi}"]`);
                if (!el) return;

                const rect = el.getBoundingClientRect();
                const wrapperRect = wrapper.getBoundingClientRect();
                const left = rect.left - wrapperRect.left + wrapper.scrollLeft;
                const right = rect.right - wrapperRect.left + wrapper.scrollLeft;

                minX = Math.min(minX, left);
                maxX = Math.max(maxX, right);
            });

            if (minX === Infinity) return;

            // Scroll so the chord is visible and centered if possible
            const margin = 24;
            const targetLeft = Math.max(0, minX - margin);
            const targetRight = Math.min(wrapper.scrollWidth, maxX + margin);
            const targetCenter = (targetLeft + targetRight) / 2;
            const viewport = container.clientWidth;
            const scrollTo = Math.max(0, targetCenter - viewport / 2);

            container.scrollTo({ left: scrollTo, behavior: 'smooth' });
        }

        // Render note picker
        function renderNotePicker(containerId, activeNote, onClick) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'flex gap-4 overflow-x-auto pb-3 snap-x scrollbar-thin';
            
            noteNamesAll.forEach(note => {
                const btn = document.createElement('button');
                btn.textContent = note;
                btn.className = `
                    h-12 flex items-center justify-center text-base font-semibold rounded-2xl transition-all flex-shrink-0 min-w-[46px]
                    ${note === activeNote 
                        ? 'bg-blue-500 text-white shadow-md scale-105' 
                        : 'bg-white border border-zinc-200 hover:border-zinc-300 text-zinc-700'}
                `;
                btn.addEventListener('click', () => onClick(note));
                wrapper.appendChild(btn);
            });
            
            container.appendChild(wrapper);
        }

        // Render instrument picker
        function renderInstrumentPicker(containerId, activeInstrument, onClick) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'flex gap-2 overflow-x-auto pb-2 snap-x';
            
            instrumentList.forEach(inst => {
                const btn = document.createElement('button');
                btn.textContent = inst;
                btn.className = `flex-shrink-0 px-7 py-3 text-sm font-semibold rounded-3xl transition-all snap-start ${
                    inst === activeInstrument 
                        ? 'bg-blue-500 text-white shadow-md' 
                        : 'bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700'
                }`;
                btn.onclick = () => onClick(inst);
                wrapper.appendChild(btn);
            });
            
            container.appendChild(wrapper);
        }

        // Get inverted notes
        function getInvertedNotes(originalNotes, level) {
            if (!originalNotes || originalNotes.length === 0) return [];
            let sorted = [...originalNotes].sort((a, b) => a - b);
            let result = [...sorted];
            const actualLevel = level % sorted.length || 0;
            for (let i = 0; i < actualLevel; i++) {
                const lowest = result.shift();
                result.push(Math.min(108, lowest + 12));
            }
            return result;
        }

        // Render inversion picker
        function renderInversionPicker(containerId, numNotes, currentLevel) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            if (numNotes < 2) {
                const empty = document.createElement('div');
                empty.className = 'text-zinc-400 text-sm px-2 py-3 italic';
                empty.textContent = 'Single note – no inversions available';
                container.appendChild(empty);
                return;
            }
            
            const labels = ["Root position"];
            for (let i = 1; i < numNotes; i++) {
                const suffix = i === 1 ? 'st' : i === 2 ? 'nd' : i === 3 ? 'rd' : 'th';
                labels.push(`${i}${suffix} inversion`);
            }
            
            labels.forEach((label, idx) => {
                const btn = document.createElement('button');
                btn.textContent = label;
                btn.className = `flex-shrink-0 px-7 py-3 text-sm font-semibold rounded-3xl transition-all snap-start ${
                    idx === currentLevel 
                        ? 'bg-blue-500 text-white shadow-md' 
                        : 'bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700'
                }`;
                btn.onclick = () => selectInversion(idx);
                container.appendChild(btn);
            });
        }

        function selectInversion(level) {
            infoCurrentInversion = level;
            
            renderChordInfo(currentChordId, infoCurrentInstrument);
        }

        function getEntryMidis(entry, instData) {
            if (entry.type === 'keyboard') {
                return entry.data;
            } else {
                return entry.data.reduce((arr, f, s) => {
                    if (f > 0) arr.push(instData.openMidis[s] + f);
                    return arr;
                }, []);
            }
        }

        // Render chord list
        function renderChordList() {
            const container = document.getElementById('chord-list');
            container.innerHTML = '';

            if (chords.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'flex flex-col items-center justify-center h-96 text-center px-8';
                empty.innerHTML = `
                    <div class="w-20 h-20 bg-zinc-100 rounded-3xl flex items-center justify-center mb-6">
                        <span class="text-4xl">🎹</span>
                    </div>
                    <p class="font-medium text-zinc-400">No chords yet</p>
                    <p class="text-zinc-400 text-sm mt-2">Tap the + to create your first chord</p>
                `;
                container.appendChild(empty);
                return;
            }

            const unfiledChords = chords.filter(c => !c.folderId || !folders.some(f => f.id === c.folderId));
            const folderChords = (folderId) => chords.filter(c => c.folderId === folderId);

            if (unfiledChords.length > 0) {
                container.appendChild(renderChordSection('All Chords', unfiledChords, false));
            }

            folders.forEach(folder => {
                const chordsInFolder = folderChords(folder.id);
                container.appendChild(renderChordSection(folder.name, chordsInFolder, true, folder.id));
            });
        }

        function renderChordSection(title, chordList, isFolder, folderId) {
            const section = document.createElement('div');

            const header = document.createElement('div');
            header.className = 'flex items-center justify-between bg-white border border-zinc-100 rounded-3xl px-5 py-4 ' + (isFolder ? 'cursor-pointer' : '');
            header.innerHTML = `
                <div class="font-semibold text-zinc-900">${title}</div>
                <div class="text-xs text-zinc-400 font-mono">${chordList.length} chord${chordList.length === 1 ? '' : 's'}</div>
            `;

            if (isFolder) {
                header.addEventListener('click', () => {
                    folderExpandedStates[folderId] = !folderExpandedStates[folderId];
                    renderChordList();
                });
            }

            section.appendChild(header);

            const list = document.createElement('div');
            list.className = 'mt-3 space-y-3';

            const expanded = isFolder ? folderExpandedStates[folderId] !== false : true;
            if (expanded) {
                if (chordList.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'text-zinc-400 text-sm italic px-6 py-4 bg-white border border-zinc-100 rounded-3xl';
                    empty.textContent = isFolder ? 'No chords in this folder yet' : 'No chords added yet';
                    list.appendChild(empty);
                } else {
                    chordList.forEach(chord => {
                        list.appendChild(createChordCard(chord));
                    });
                }
            }

            section.appendChild(list);
            return section;
        }

        function createChordCard(chord) {
            const pianoEntry = chord.instruments.Piano;
            const noteCount = pianoEntry ? getEntryMidis(pianoEntry, instrumentData.Piano).length : 0;
            const card = document.createElement('div');
            card.className = `chord-card bg-white border border-zinc-100 rounded-3xl px-6 py-5 cursor-pointer active:scale-[0.985]`;
            card.innerHTML = `
                <div class="flex items-center justify-between">
                    <div>
                        <div class="title-font text-2xl font-semibold tracking-tighter text-zinc-900">${chord.fullName}</div>
                        <div class="text-xs text-zinc-400 font-mono mt-1">${noteCount} notes</div>
                    </div>
                    <div class="text-3xl text-blue-200">♫</div>
                </div>
            `;
            card.addEventListener('click', () => showChordInfo(chord.id));
            return card;
        }

        function makeFolderId() {
            return `folder-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
        }

        function getDefaultFolders() {
            return [
                { id: 'folder-chords', name: 'Chords' },
                { id: 'folder-scales', name: 'Scales' },
                { id: 'folder-modes', name: 'modes' }
            ];
        }

        function saveToStorage() {
            localStorage.setItem('chordLibrary', JSON.stringify({ chords, folders }));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('chordLibrary');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed)) {
                    chords = parsed;
                    folders = getDefaultFolders();
                } else {
                    chords = parsed.chords || [];
                    folders = parsed.folders || getDefaultFolders();
                }

                // Backward compatibility
                chords.forEach(chord => {
                    if (chord.notes) {
                        chord.instruments = {Piano: {type: 'keyboard', data: chord.notes}};
                        delete chord.notes;
                    }
                });
            } else {
                chords = [
                    { id: 1739000000000, root: "C", suffix: "maj7", fullName: "Cmaj7", instruments: {Piano: {type: 'keyboard', data: [60, 64, 67, 71]}} },
                    { id: 1739000000001, root: "C", suffix: "dim", fullName: "Cdim", instruments: {Piano: {type: 'keyboard', data: [60, 63, 66]}} },
                    { id: 1739000000002, root: "D#", suffix: "9", fullName: "D#9", instruments: {Piano: {type: 'keyboard', data: [63, 66, 70, 73, 75]}} }
                ];
                folders = getDefaultFolders();
                saveToStorage();
            }

            folders.forEach(f => {
                if (folderExpandedStates[f.id] === undefined) {
                    folderExpandedStates[f.id] = true;
                }
            });
        }

        // Folder UI and helpers
        function handleSaveFolderClick() {
            if (!saveInFolderMode) {
                saveInFolderMode = true;
                updateFolderControls();
                return;
            }

            // If folder mode is already active, treat as the save action.
            saveChord(true);
        }

        function updateFolderControls() {
            const folderControls = document.getElementById('folder-controls');
            const folderBtn = document.getElementById('save-folder-btn');
            if (saveInFolderMode) {
                folderControls.classList.remove('hidden');
                folderBtn.classList.add('bg-blue-500', 'text-white');
                folderBtn.classList.remove('bg-white', 'text-zinc-700');
                renderFolderSelect();
            } else {
                folderControls.classList.add('hidden');
                folderBtn.classList.remove('bg-blue-500', 'text-white');
                folderBtn.classList.add('bg-white', 'text-zinc-700');
            }
        }

        function renderFolderSelect() {
            const select = document.getElementById('folder-select');
            if (!select) return;

            select.innerHTML = '';
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = 'Select a folder';
            placeholder.disabled = true;
            placeholder.selected = !selectedFolderId;
            select.appendChild(placeholder);

            folders.forEach(folder => {
                const opt = document.createElement('option');
                opt.value = folder.id;
                opt.textContent = folder.name;
                opt.selected = folder.id === selectedFolderId;
                select.appendChild(opt);
            });

            const createOpt = document.createElement('option');
            createOpt.value = '__create__';
            createOpt.textContent = '+ Create new folder...';
            select.appendChild(createOpt);

            select.onchange = () => {
                if (select.value === '__create__') {
                    handleCreateFolder();
                } else {
                    selectedFolderId = select.value;
                }
            };
        }

        function handleCreateFolder() {
            const name = prompt('New folder name');
            if (!name) return;
            const folder = { id: makeFolderId(), name };
            folders.push(folder);
            folderExpandedStates[folder.id] = true;
            selectedFolderId = folder.id;
            saveToStorage();
            renderFolderSelect();
            renderChordList();
        }

        function hideAllViews() {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('chord-info-view').classList.add('hidden');
            document.getElementById('new-chord-view').classList.add('hidden');
        }

        function showMainView() {
            hideAllViews();
            document.getElementById('main-view').classList.remove('hidden');
            renderChordList();
        }

        function renderChordInfo(id, inst) {
            const chord = chords.find(c => c.id === id);
            if (!chord) return;
            
            document.getElementById('info-chord-name').textContent = chord.fullName;
            
            const entry = chord.instruments[inst];
            const hasEntry = !!entry;
            document.getElementById('edit-btn').disabled = !hasEntry;
            
            const container = document.getElementById('info-instrument-container');
            container.innerHTML = '';
            
            if (!hasEntry) {
                const empty = document.createElement('div');
                empty.className = 'text-zinc-400 text-sm italic text-center py-8';
                empty.textContent = 'No chord defined for this instrument';
                container.appendChild(empty);
                return;
            }
            
            const instData = instrumentData[inst];
            let midiArray = [];
            if (entry.type === 'keyboard') {
                const originalNotes = getEntryMidis(entry, instData);
                const displayedNotes = getInvertedNotes(originalNotes, infoCurrentInversion);
                const selectedSet = new Set(displayedNotes);
                renderKeyboard('info-instrument-container', selectedSet, false);
                midiArray = displayedNotes;
                renderInversionPicker('inversion-picker', originalNotes.length, infoCurrentInversion);
                document.getElementById('inversion-section').classList.remove('hidden');
            } else {
                const frets = entry.data;
                renderFretboard('info-instrument-container', frets, false, null, instData);
                midiArray = frets.reduce((arr, f, s) => {
                    if (f > 0) arr.push(instData.openMidis[s] + f);
                    return arr;
                }, []);
                document.getElementById('inversion-section').classList.add('hidden');
            }
            
            setTimeout(() => {
                autoScrollInstrument('info-instrument-container', midiArray);
            }, 50);
        }

        function showChordInfo(id) {
            currentChordId = id;
            infoCurrentInversion = 0;
            infoCurrentInstrument = "Piano";
            hideAllViews();
            document.getElementById('chord-info-view').classList.remove('hidden');
            
            const chord = chords.find(c => c.id === id);
            renderNotePicker('transpose-picker', chord.root, (newRoot) => {
                transposeChord(id, newRoot);
            });
            
            renderInstrumentPicker('info-instrument-picker', infoCurrentInstrument, selectInfoInstrument);
            
            renderChordInfo(id, infoCurrentInstrument);
        }

        function transposeChord(id, newRoot) {
            const chord = chords.find(c => c.id === id);
            if (!chord) return;
            
            const inst = infoCurrentInstrument;
            const entry = chord.instruments[inst];
            if (!entry) return;
            
            const oldRootMidi = getRootMidi(chord.root);
            const newRootMidi = getRootMidi(newRoot);
            const delta = newRootMidi - oldRootMidi;
            
            if (entry.type === 'keyboard') {
                entry.data = entry.data.map(m => Math.max(21, Math.min(108, m + delta)));
            } else {
                entry.data = entry.data.map(f => f > 0 ? Math.max(1, f + delta) : f);
            }
            
            chord.root = newRoot;
            chord.fullName = newRoot + chord.suffix;
            
            saveToStorage();
            showChordInfo(id);
        }

        function selectInfoInstrument(inst) {
            infoCurrentInstrument = inst;
            infoCurrentInversion = 0;
            renderInstrumentPicker('info-instrument-picker', infoCurrentInstrument, selectInfoInstrument);
            renderChordInfo(currentChordId, infoCurrentInstrument);
        }

        function editCurrentChord() {
            const chord = chords.find(c => c.id === currentChordId);
            if (!chord) return;
            
            editingChordId = currentChordId;
            currentRoot = chord.root;
            currentSuffix = chord.suffix;
            currentInstrument = infoCurrentInstrument;

            saveInFolderMode = Boolean(chord.folderId);
            selectedFolderId = chord.folderId || null;
            updateFolderControls();
            
            document.getElementById('chord-suffix-input').value = currentSuffix;
            
            hideAllViews();
            document.getElementById('new-chord-view').classList.remove('hidden');
            
            renderNotePicker('root-picker', currentRoot, (note) => {
                currentRoot = note;
                renderNotePicker('root-picker', currentRoot, arguments.callee);
                updateSelectedCount();
            });
            
            renderInstrumentPicker('new-instrument-picker', currentInstrument, selectNewInstrument);
            
            const entry = chord.instruments[currentInstrument];
            const instType = instrumentData[currentInstrument].type;
            if (instType === 'keyboard') {
                selectedMidis = new Set(entry ? entry.data : []);
                selectedFrets = [];
            } else {
                selectedFrets = entry ? [...entry.data] : new Array(instrumentData[currentInstrument].openMidis.length).fill(-1);
                selectedMidis = new Set();
            }
            
            renderInstrumentContainer('new-instrument-container', currentInstrument, true);
            updateSelectedCount();
        }

        function deleteCurrentChord() {
            if (!confirm('Delete this chord?')) return;
            chords = chords.filter(c => c.id !== currentChordId);
            saveToStorage();
            backToMain();
        }

        function showNewChordForm() {
            editingChordId = null;
            currentRoot = "C";
            currentSuffix = "";
            currentInstrument = "Piano";
            selectedMidis = new Set();
            selectedFrets = [];
            saveInFolderMode = false;
            selectedFolderId = null;
            updateFolderControls();
            document.getElementById('chord-suffix-input').value = "";
            
            hideAllViews();
            document.getElementById('new-chord-view').classList.remove('hidden');
            
            renderNotePicker('root-picker', currentRoot, (note) => {
                currentRoot = note;
                renderNotePicker('root-picker', currentRoot, arguments.callee);
            });
            
            renderInstrumentPicker('new-instrument-picker', currentInstrument, selectNewInstrument);
            
            renderInstrumentContainer('new-instrument-container', currentInstrument, true);
            updateSelectedCount();
        }

        function selectNewInstrument(inst) {
            currentInstrument = inst;
            const instType = instrumentData[inst].type;
            if (instType === 'keyboard') {
                selectedMidis = new Set();
                selectedFrets = [];
            } else {
                selectedFrets = new Array(instrumentData[inst].openMidis.length).fill(-1);
                selectedMidis = new Set();
            }
            renderInstrumentPicker('new-instrument-picker', currentInstrument, selectNewInstrument);
            renderInstrumentContainer('new-instrument-container', currentInstrument, true);
            updateSelectedCount();
        }

        function renderInstrumentContainer(containerId, instrumentName, interactive) {
            const instData = instrumentData[instrumentName];
            const instType = instData.type;
            if (instType === 'keyboard') {
                renderKeyboard(containerId, selectedMidis, interactive, handleNoteToggle);
            } else {
                renderFretboard(containerId, selectedFrets, interactive, handleNoteToggle, instData);
            }
        }

        function handleNoteToggle(...args) {
            const instType = instrumentData[currentInstrument].type;
            if (instType === 'keyboard') {
                const midi = args[0];
                if (selectedMidis.has(midi)) {
                    selectedMidis.delete(midi);
                } else {
                    selectedMidis.add(midi);
                }
            } else {
                const [s, f] = args;
                if (selectedFrets[s] === f) {
                    selectedFrets[s] = -1;
                } else {
                    selectedFrets[s] = f;
                }
            }
            renderInstrumentContainer('new-instrument-container', currentInstrument, true);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            let count = 0;
            const instType = instrumentData[currentInstrument].type;
            if (instType === 'keyboard') {
                count = selectedMidis.size;
            } else {
                count = selectedFrets.reduce((c, f) => c + (f > 0 ? 1 : 0), 0);
            }
            const countEl = document.getElementById('selected-count');
            countEl.textContent = `${count} note${count === 1 ? '' : 's'}`;
            
            const saveBtn = document.getElementById('save-btn');
            const suffix = document.getElementById('chord-suffix-input').value.trim();
            saveBtn.disabled = count === 0 || !suffix;
        }

        function saveChord(saveToFolder = false) {
            saveInFolderMode = saveToFolder;
            updateFolderControls();

            const suffixInput = document.getElementById('chord-suffix-input');
            let suffix = suffixInput.value.trim();
            
            if (!suffix) {
                alert("Please enter a chord suffix (e.g. maj7)");
                return;
            }
            if (updateSelectedCount(), document.getElementById('save-btn').disabled) {
                alert("Please select at least one note");
                return;
            }

            if (saveToFolder && !selectedFolderId) {
                alert("Please select a folder to save the chord in.");
                return;
            }
            
            const fullName = currentRoot + suffix;
            const instType = instrumentData[currentInstrument].type;
            const data = instType === 'keyboard' ? Array.from(selectedMidis).sort((a, b) => a - b) : [...selectedFrets];
            const folderId = saveToFolder ? selectedFolderId : null;
            
            if (editingChordId !== null) {
                const chord = chords.find(c => c.id === editingChordId);
                if (chord) {
                    chord.root = currentRoot;
                    chord.suffix = suffix;
                    chord.fullName = fullName;
                    chord.instruments[currentInstrument] = {type: instType, data};
                    chord.folderId = folderId;
                }
            } else {
                const newChord = {
                    id: Date.now(),
                    root: currentRoot,
                    suffix: suffix,
                    fullName: fullName,
                    instruments: {[currentInstrument]: {type: instType, data}},
                    folderId: folderId
                };
                chords.unshift(newChord);
            }
            
            saveToStorage();
            saveInFolderMode = false;
            updateFolderControls();
            backToMain();
        }

        function backToMain() {
            showMainView();
        }

        function setupInputListeners() {
            const suffixInput = document.getElementById('chord-suffix-input');
            suffixInput.addEventListener('input', () => {
                currentSuffix = suffixInput.value.trim();
                updateSelectedCount();
            });
        }

        function initializeApp() {
            loadFromStorage();
            showMainView();
            setupInputListeners();
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
