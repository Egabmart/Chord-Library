<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --white-key-w: 34px;
            --black-key-w: 21px;
        }

        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .piano-keyboard {
            scrollbar-width: thin;
            scrollbar-color: #64748b #f1f5f9;
            touch-action: pan-x;
            overflow-x: auto;
            overflow-y: hidden;
        }
        
        .white-key {
            width: var(--white-key-w);
            height: 168px;
            background: white;
            border: 2px solid #e2e8f0;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }
        
        .white-key:hover {
            background: #f8fafc;
        }
        
        .white-key.selected {
            background: #3b82f6 !important;
            border-color: #2563eb;
            color: white;
        }
        
        .black-key {
            width: var(--black-key-w);
            height: 108px;
            background: #1e2937;
            border: 2px solid #334155;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
            margin-left: -10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .black-key:hover {
            background: #334155;
        }
        
        .black-key.selected {
            background: #1e40af !important;
            border-color: #1e3a8a;
            color: white;
        }
        
        .key-label {
            font-size: 10px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
            letter-spacing: -.02em;
        }
        
        .chord-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .chord-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="tail-container bg-zinc-950 text-zinc-200 min-h-screen flex items-center justify-center">
    <div id="app" 
         class="w-full max-w-[420px] mx-auto bg-white min-h-screen shadow-2xl overflow-hidden flex flex-col">
        
        <!-- MAIN VIEW -->
        <div id="main-view" class="flex-1 flex flex-col">
            <!-- Header -->
            <div class="px-6 pt-8 pb-4 bg-white border-b border-zinc-100 flex items-center justify-between">
                <div>
                    <h1 class="title-font text-3xl font-semibold tracking-tighter text-zinc-900">Chord Library</h1>
                    <p class="text-zinc-400 text-sm mt-0.5">Your saved chords</p>
                </div>
                <button onclick="showNewChordForm()" 
                        class="w-12 h-12 bg-blue-500 hover:bg-blue-600 transition-colors text-white rounded-3xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.25" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                </button>
            </div>

            <!-- Chord List -->
            <div id="chord-list" class="flex-1 overflow-y-auto px-4 py-6 space-y-3 bg-zinc-50">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- CHORD INFO VIEW -->
        <div id="chord-info-view" class="hidden flex-1 flex flex-col">
            <!-- Header -->
            <div class="px-5 pt-6 pb-3 bg-white border-b border-zinc-100 flex items-center">
                <button onclick="backToMain()" 
                        class="flex items-center text-blue-500 font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                    </svg>
                    Back
                </button>
                <div class="flex-1 text-center">
                    <div id="info-chord-name" 
                         class="title-font text-2xl font-semibold tracking-tighter text-zinc-900"></div>
                </div>
                <div class="flex gap-3">
                    <button onclick="editCurrentChord()" 
                            class="px-5 py-2 text-sm font-semibold bg-white border border-zinc-200 hover:border-zinc-300 rounded-2xl text-blue-500">
                        Edit
                    </button>
                    <button onclick="deleteCurrentChord()" 
                            class="px-5 py-2 text-sm font-semibold bg-red-50 text-red-500 hover:bg-red-100 rounded-2xl">
                        Delete
                    </button>
                </div>
            </div>

            <!-- Transpose -->
            <div class="px-6 pt-6 pb-2 bg-white">
                <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3 px-1">TRANSPOSE</div>
                <div id="transpose-picker"></div>
            </div>

            <!-- Inversion -->
            <div class="px-6 pt-4 pb-4 bg-white border-t border-zinc-100">
                <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3 px-1">INVERSION</div>
                <div id="inversion-picker" class="flex gap-2 overflow-x-auto pb-2 snap-x"></div>
            </div>

            <!-- Keyboard -->
            <div class="flex-1 bg-zinc-50 px-4 pt-6 pb-6">
                <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3 px-1">KEYBOARD</div>
                <div id="info-keyboard-container" class="piano-keyboard"></div>
            </div>
        </div>

        <!-- NEW CHORD VIEW -->
        <div id="new-chord-view" class="hidden flex-1 flex flex-col">
            <!-- Header -->
            <div class="px-5 pt-6 pb-3 bg-white border-b border-zinc-100 flex items-center">
                <button onclick="backToMain()" 
                        class="flex items-center text-blue-500 font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                    </svg>
                    Back
                </button>
                <div class="flex-1 text-center title-font text-2xl font-semibold tracking-tighter text-zinc-900">New Chord</div>
                <div class="w-9"></div>
            </div>

            <div class="flex-1 overflow-y-auto bg-zinc-50">
                <!-- Root Picker -->
                <div class="px-6 pt-6">
                    <div class="text-xs font-medium tracking-widest text-zinc-400 mb-3">ROOT NOTE</div>
                    <div id="root-picker"></div>
                </div>

                <!-- Chord Name -->
                <div class="px-6 mt-8">
                    <div class="text-xs font-medium tracking-widest text-zinc-400 mb-2">CHORD NAME (suffix)</div>
                    <input id="chord-suffix-input" 
                           type="text" 
                           placeholder="maj7"
                           class="w-full bg-white border border-zinc-200 focus:border-blue-500 focus:ring-0 rounded-3xl px-5 py-4 text-xl font-medium text-zinc-900 placeholder-zinc-300">
                    <div class="text-[10px] text-zinc-400 mt-2 px-1">Example: maj7, m7, dim, 7, sus4...</div>
                </div>

                <!-- Keyboard section -->
                <div class="px-6 mt-9 pb-8">
                    <div class="flex items-baseline justify-between mb-3 px-1">
                        <div class="text-xs font-medium tracking-widest text-zinc-400">CHORD MAKER</div>
                        <div id="selected-count" 
                             class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-3xl font-mono">0 notes</div>
                    </div>
                    <div id="new-keyboard-container" class="piano-keyboard"></div>
                </div>
            </div>

            <!-- Save Button -->
            <div class="p-6 bg-white border-t border-zinc-100">
                <button onclick="saveChord()"
                        id="save-btn"
                        class="w-full bg-blue-500 hover:bg-blue-600 transition-all disabled:bg-zinc-200 disabled:text-zinc-400 text-white font-semibold text-lg py-5 rounded-3xl shadow-xl shadow-blue-500/40">
                    SAVE CHORD
                </button>
            </div>
        </div>
    </div>

    <script>
        // Note names
        const noteNamesAll = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        // Data
        let chords = [];
        let currentChordId = null;
        let editingChordId = null;
        let infoCurrentInversion = 0;   // ← NEW: tracks temporary inversion in info view only

        // Current new chord state
        let currentRoot = "C";
        let currentSuffix = "";
        let selectedMidis = new Set();

        // Helpers
        function midiToNoteName(midi) {
            const octave = Math.floor(midi / 12) - 1;
            const noteIndex = midi % 12;
            return noteNamesAll[noteIndex] + octave;
        }

        function noteNameToMidi(noteName) {
            const octave = parseInt(noteName.slice(-1));
            let notePart = noteName.slice(0, -1);
            const index = noteNamesAll.indexOf(notePart);
            if (index === -1) return 60;
            return 12 * (octave + 1) + index;
        }

        function getRootMidi(root) {
            return noteNameToMidi(root + "4");
        }

        function generateAllKeys() {
            const keys = [];
            let midi = 21;
            while (midi <= 108) {
                const noteIndex = midi % 12;
                const noteName = noteNamesAll[noteIndex];
                const octave = Math.floor(midi / 12) - 1;
                const isBlack = noteName.includes("#");
                keys.push({
                    midi: midi,
                    noteName: noteName,
                    octave: octave,
                    isBlack: isBlack
                });
                midi++;
            }
            return keys;
        }

        // Render piano keyboard
        function renderKeyboard(containerId, selectedSet, interactive = false, toggleCallback = null) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'piano-keyboard flex overflow-x-auto bg-white border border-zinc-200 rounded-3xl p-4 shadow-inner gap-0 min-w-max snap-x';
            
            const allKeys = generateAllKeys();
            
            allKeys.forEach(key => {
                const keyEl = document.createElement('div');
                
                if (key.isBlack) {
                    keyEl.className = `black-key flex-shrink-0 flex flex-col items-center justify-end text-[9px] font-medium text-white`;
                } else {
                    keyEl.className = `white-key flex-shrink-0 flex flex-col items-center justify-end`;
                }
                
                keyEl.dataset.midi = key.midi;
                
                if (selectedSet.has(key.midi)) {
                    keyEl.classList.add('selected');
                }
                
                if (!key.isBlack && key.noteName === "C") {
                    const label = document.createElement('div');
                    label.className = 'key-label';
                    label.textContent = `C${key.octave}`;
                    keyEl.appendChild(label);
                }
                
                if (interactive) {
                    keyEl.style.cursor = 'pointer';
                    keyEl.addEventListener('click', () => {
                        if (toggleCallback) toggleCallback(key.midi);
                    });
                }
                
                wrapper.appendChild(keyEl);
            });
            
            container.appendChild(wrapper);
            return wrapper;
        }

        // Auto-scroll to center the currently displayed notes
        function autoScrollKeyboard(containerId, midiArray) {
            const container = document.getElementById(containerId);
            const wrapper = container.querySelector('.piano-keyboard');
            if (!wrapper || midiArray.length === 0) return;

            const keys = Array.from(wrapper.children);
            let minOffset = Infinity;
            let maxOffset = -Infinity;

            midiArray.forEach(midi => {
                const keyEl = keys.find(k => parseInt(k.dataset.midi) === midi);
                if (keyEl) {
                    const offset = keyEl.offsetLeft;
                    minOffset = Math.min(minOffset, offset);
                    maxOffset = Math.max(maxOffset, offset + keyEl.offsetWidth);
                }
            });

            const chordCenter = (minOffset + maxOffset) / 2;
            const viewportWidth = wrapper.clientWidth;
            const scrollTo = Math.max(0, Math.round(chordCenter - viewportWidth / 2));

            wrapper.scrollTo({ left: scrollTo, behavior: 'smooth' });
        }

        // Horizontal scrollable picker (Root Note & Transpose)
        function renderNotePicker(containerId, activeNote, onClick) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const wrapper = document.createElement('div');
            wrapper.className = 'flex gap-4 overflow-x-auto pb-3 snap-x scrollbar-thin';
            
            noteNamesAll.forEach(note => {
                const btn = document.createElement('button');
                btn.textContent = note;
                btn.className = `
                    h-12 flex items-center justify-center text-base font-semibold rounded-2xl transition-all flex-shrink-0 min-w-[46px]
                    ${note === activeNote 
                        ? 'bg-blue-500 text-white shadow-md scale-105' 
                        : 'bg-white border border-zinc-200 hover:border-zinc-300 text-zinc-700'}
                `;
                btn.addEventListener('click', () => onClick(note));
                wrapper.appendChild(btn);
            });
            
            container.appendChild(wrapper);
        }

        // Inversion – now temporary only (original notes never change)
        function getInvertedNotes(originalNotes, level) {
            if (!originalNotes || originalNotes.length === 0) return [];
            let sorted = [...originalNotes].sort((a, b) => a - b);
            let result = [...sorted];
            const actualLevel = level % sorted.length || 0;
            for (let i = 0; i < actualLevel; i++) {
                const lowest = result.shift();
                result.push(Math.min(108, lowest + 12));
            }
            return result;
        }

        function renderInversionPicker(containerId, chord, currentLevel) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            const num = chord.notes.length;
            if (num < 2) {
                const empty = document.createElement('div');
                empty.className = 'text-zinc-400 text-sm px-2 py-3 italic';
                empty.textContent = 'Single note – no inversions available';
                container.appendChild(empty);
                return;
            }
            
            const flex = document.createElement('div');
            flex.className = 'flex gap-2 overflow-x-auto pb-2 snap-x';
            
            const labels = ["Root position"];
            for (let i = 1; i < num; i++) {
                const suffix = i === 1 ? 'st' : i === 2 ? 'nd' : i === 3 ? 'rd' : 'th';
                labels.push(`${i}${suffix} inversion`);
            }
            
            labels.forEach((label, idx) => {
                const btn = document.createElement('button');
                btn.textContent = label;
                btn.className = `flex-shrink-0 px-7 py-3 text-sm font-semibold rounded-3xl transition-all snap-start ${
                    idx === currentLevel 
                        ? 'bg-blue-500 text-white shadow-md' 
                        : 'bg-white border border-zinc-200 hover:bg-zinc-50 text-zinc-700'
                }`;
                btn.onclick = () => selectInversion(chord.id, idx);
                flex.appendChild(btn);
            });
            
            container.appendChild(flex);
        }

        function selectInversion(id, level) {
            infoCurrentInversion = level;
            const chord = chords.find(c => c.id === id);
            if (!chord) return;
            
            // Re-render inversion buttons (highlight active)
            renderInversionPicker('inversion-picker', chord, infoCurrentInversion);
            
            // Compute temporary inverted notes for display only
            const displayedNotes = getInvertedNotes(chord.notes, infoCurrentInversion);
            const selectedSet = new Set(displayedNotes);
            
            renderKeyboard('info-keyboard-container', selectedSet, false);
            autoScrollKeyboard('info-keyboard-container', displayedNotes);
        }

        // Render main list
        function renderChordList() {
            const container = document.getElementById('chord-list');
            container.innerHTML = '';
            
            if (chords.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'flex flex-col items-center justify-center h-96 text-center px-8';
                empty.innerHTML = `
                    <div class="w-20 h-20 bg-zinc-100 rounded-3xl flex items-center justify-center mb-6">
                        <span class="text-4xl">🎹</span>
                    </div>
                    <p class="font-medium text-zinc-400">No chords yet</p>
                    <p class="text-zinc-400 text-sm mt-2">Tap the + to create your first chord</p>
                `;
                container.appendChild(empty);
                return;
            }
            
            chords.forEach(chord => {
                const card = document.createElement('div');
                card.className = `chord-card bg-white border border-zinc-100 rounded-3xl px-6 py-5 cursor-pointer active:scale-[0.985]`;
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="title-font text-2xl font-semibold tracking-tighter text-zinc-900">${chord.fullName}</div>
                            <div class="text-xs text-zinc-400 font-mono mt-1">${chord.notes.length} notes</div>
                        </div>
                        <div class="text-3xl text-blue-200">♫</div>
                    </div>
                `;
                card.addEventListener('click', () => showChordInfo(chord.id));
                container.appendChild(card);
            });
        }

        function saveToStorage() {
            localStorage.setItem('chordLibrary', JSON.stringify(chords));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('chordLibrary');
            if (saved) {
                chords = JSON.parse(saved);
            } else {
                chords = [
                    { id: 1739000000000, root: "C", suffix: "maj7", fullName: "Cmaj7", notes: [60, 64, 67, 71] },
                    { id: 1739000000001, root: "C", suffix: "dim", fullName: "Cdim", notes: [60, 63, 66] },
                    { id: 1739000000002, root: "D#", suffix: "9", fullName: "D#9", notes: [63, 66, 70, 73, 75] }
                ];
                saveToStorage();
            }
        }

        function hideAllViews() {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('chord-info-view').classList.add('hidden');
            document.getElementById('new-chord-view').classList.add('hidden');
        }

        function showMainView() {
            hideAllViews();
            document.getElementById('main-view').classList.remove('hidden');
            renderChordList();
        }

        function showChordInfo(id) {
            currentChordId = id;
            const chord = chords.find(c => c.id === id);
            if (!chord) return;
            
            hideAllViews();
            const view = document.getElementById('chord-info-view');
            view.classList.remove('hidden');
            
            document.getElementById('info-chord-name').textContent = chord.fullName;
            
            // Reset inversion when entering the view
            infoCurrentInversion = 0;
            
            renderNotePicker('transpose-picker', chord.root, (newRoot) => {
                transposeChord(id, newRoot);
            });
            
            renderInversionPicker('inversion-picker', chord, infoCurrentInversion);
            
            // Display the CURRENT inversion (temporary)
            const displayedNotes = getInvertedNotes(chord.notes, infoCurrentInversion);
            const selectedSet = new Set(displayedNotes);
            renderKeyboard('info-keyboard-container', selectedSet, false);
            
            // Auto-scroll to the visible notes
            setTimeout(() => {
                autoScrollKeyboard('info-keyboard-container', displayedNotes);
            }, 50);
        }

        function transposeChord(id, newRoot) {
            const chordIndex = chords.findIndex(c => c.id === id);
            if (chordIndex === -1) return;
            
            const chord = chords[chordIndex];
            const oldRootMidi = getRootMidi(chord.root);
            const newRootMidi = getRootMidi(newRoot);
            const delta = newRootMidi - oldRootMidi;
            
            // Transpose the ORIGINAL root-position notes
            const newNotes = chord.notes.map(midi => {
                let newMidi = midi + delta;
                return Math.max(21, Math.min(108, newMidi));
            });
            
            chord.root = newRoot;
            chord.fullName = newRoot + chord.suffix;
            chord.notes = newNotes;
            
            saveToStorage();
            showChordInfo(id); // this resets inversion to root position
        }

        function editCurrentChord() {
            const chord = chords.find(c => c.id === currentChordId);
            if (!chord) return;
            
            editingChordId = currentChordId;
            currentRoot = chord.root;
            currentSuffix = chord.suffix;
            selectedMidis = new Set(chord.notes);
            
            document.getElementById('chord-suffix-input').value = currentSuffix;
            
            hideAllViews();
            document.getElementById('new-chord-view').classList.remove('hidden');
            
            renderNotePicker('root-picker', currentRoot, (note) => {
                currentRoot = note;
                renderNotePicker('root-picker', currentRoot, arguments.callee);
                updateSelectedCount();
            });
            
            renderKeyboard('new-keyboard-container', selectedMidis, true, handleNoteToggle);
            updateSelectedCount();
        }

        function deleteCurrentChord() {
            if (!confirm('Delete this chord?')) return;
            chords = chords.filter(c => c.id !== currentChordId);
            saveToStorage();
            backToMain();
        }

        function showNewChordForm() {
            editingChordId = null;
            currentRoot = "C";
            currentSuffix = "";
            selectedMidis = new Set();
            document.getElementById('chord-suffix-input').value = "";
            
            hideAllViews();
            const view = document.getElementById('new-chord-view');
            view.classList.remove('hidden');
            
            renderNotePicker('root-picker', currentRoot, (note) => {
                currentRoot = note;
                renderNotePicker('root-picker', currentRoot, arguments.callee);
            });
            
            renderKeyboard('new-keyboard-container', selectedMidis, true, handleNoteToggle);
            updateSelectedCount();
        }

        function handleNoteToggle(midi) {
            if (selectedMidis.has(midi)) {
                selectedMidis.delete(midi);
            } else {
                selectedMidis.add(midi);
            }
            renderKeyboard('new-keyboard-container', selectedMidis, true, handleNoteToggle);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const countEl = document.getElementById('selected-count');
            countEl.textContent = `${selectedMidis.size} note${selectedMidis.size === 1 ? '' : 's'}`;
            
            const saveBtn = document.getElementById('save-btn');
            const suffix = document.getElementById('chord-suffix-input').value.trim();
            saveBtn.disabled = selectedMidis.size === 0 || !suffix;
        }

        function saveChord() {
            const suffixInput = document.getElementById('chord-suffix-input');
            let suffix = suffixInput.value.trim();
            
            if (!suffix) {
                alert("Please enter a chord suffix (e.g. maj7)");
                return;
            }
            if (selectedMidis.size === 0) {
                alert("Please select at least one note on the keyboard");
                return;
            }
            
            const fullName = currentRoot + suffix;
            
            if (editingChordId !== null) {
                const chord = chords.find(c => c.id === editingChordId);
                if (chord) {
                    chord.root = currentRoot;
                    chord.suffix = suffix;
                    chord.fullName = fullName;
                    chord.notes = Array.from(selectedMidis); // always saved as root position
                }
            } else {
                const newChord = {
                    id: Date.now(),
                    root: currentRoot,
                    suffix: suffix,
                    fullName: fullName,
                    notes: Array.from(selectedMidis)
                };
                chords.unshift(newChord);
            }
            
            saveToStorage();
            backToMain();
        }

        function backToMain() {
            showMainView();
        }

        function setupInputListeners() {
            const suffixInput = document.getElementById('chord-suffix-input');
            suffixInput.addEventListener('input', () => {
                currentSuffix = suffixInput.value.trim();
                updateSelectedCount();
            });
        }

        function initializeApp() {
            loadFromStorage();
            showMainView();
            setupInputListeners();
            console.log('%c✅ Chord Library updated! Inversion is now temporary only ✓ Root position always restored on exit ✓ Active inversion button is highlighted blue ✓', 'color:#3b82f6; font-family:monospace');
        }

        window.onload = initializeApp;
    </script>
